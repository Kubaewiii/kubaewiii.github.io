<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekipa Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- EKRAN LOGOWANIA --- */
        #login-screen {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }

        #login-screen h1 { margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            background: var(--bg-color);
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }

        input:focus { border: 2px solid var(--primary); }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--primary-hover); }

        /* --- EKRAN CZATU --- */
        #chat-screen {
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            height: 100vh; /* Na telefonach lepiej wygląda pełny ekran */
            background: var(--panel-bg);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        @media (min-width: 600px) {
            #chat-screen {
                height: 90vh;
                border-radius: 20px;
            }
        }

        .chat-header {
            background: var(--bg-color);
            padding: 20px;
            text-align: center;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Dymki wiadomości */
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.other {
            background: var(--bg-color);
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .message.me {
            background: var(--primary);
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .message .username {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: block;
        }

        .message.me .username { color: #c7d2fe; }

        .chat-input-area {
            display: flex;
            padding: 20px;
            background: var(--bg-color);
            border-top: 1px solid rgba(255,255,255,0.1);
            gap: 10px;
        }

        .chat-input-area input { margin-bottom: 0; }
        .chat-input-area button { width: auto; padding: 0 25px; }

    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Czat Ekipy 🚀</h1>
        <input type="text" id="username-input" placeholder="Wpisz swój nick..." autocomplete="off">
        <button onclick="window.login()">Wejdź na serwer</button>
    </div>

    <div id="chat-screen">
        <div class="chat-header">
            Wspólny Czat (Na Żywo)
        </div>
        
        <div class="chat-messages" id="messages-container">
            </div>

        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Napisz wiadomość..." autocomplete="off">
            <button onclick="window.sendMessage()">Wyślij</button>
        </div>
    </div>

    <script type="module">
        // Importujemy kod Firebase bezpośrednio z serwerów Google
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Twoje prywatne klucze do bazy danych
        const firebaseConfig = {
            apiKey: "AIzaSyBrP8tcT7WmfrcWGWNrm5H_1mwEpMULypQ",
            authDomain: "ekipachat.firebaseapp.com",
            projectId: "ekipachat",
            storageBucket: "ekipachat.firebasestorage.app",
            messagingSenderId: "918904566954",
            appId: "1:918904566954:web:2f1ed674c144a7bc4e0cd3",
            // Dodałem precyzyjny link do Twojej europejskiej bazy danych:
            databaseURL: "https://ekipachat-default-rtdb.europe-west1.firebasedatabase.app" 
        };

        // Odpalamy maszynę
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const messagesRef = ref(db, "messages"); // folder "messages" w bazie

        let currentUser = "";

        // Funkcja logowania
        window.login = function() {
            const usernameInput = document.getElementById('username-input').value.trim();
            if (usernameInput.length < 2) {
                alert("Nick musi mieć minimum 2 znaki, mordo!");
                return;
            }
            
            currentUser = usernameInput;
            
            // Przełączanie ekranu
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            // Odpalenie nasłuchiwania wiadomości po wejściu na czat
            listenForMessages();
        }

        // Wysyłanie Enterem
        document.getElementById("message-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                window.sendMessage();
            }
        });

        // Wysyłanie wiadomości na serwer
        window.sendMessage = function() {
            const messageInput = document.getElementById('message-input');
            const messageText = messageInput.value.trim();

            if (messageText === "") return;

            // PUSH to komenda Firebase, która wrzuca nową wiadomość do bazy
            push(messagesRef, {
                name: currentUser,
                text: messageText,
                timestamp: Date.now()
            });

            // Czyszczenie pola
            messageInput.value = '';
        }

        // Pobieranie wiadomości z serwera w czasie rzeczywistym
        function listenForMessages() {
            const container = document.getElementById('messages-container');
            container.innerHTML = ''; // Czyścimy na start
            
            // onChildAdded odpala się automatycznie ZAWSZE, gdy ktoś (nawet na innym telefonie) wyśle wiadomość
            onChildAdded(messagesRef, (snapshot) => {
                const data = snapshot.val();
                
                const messageDiv = document.createElement('div');
                
                // Sprawdzamy, czy to nasza wiadomość (kolor niebieski), czy kogoś innego (kolor szary)
                if (data.name === currentUser) {
                    messageDiv.className = 'message me';
                } else {
                    messageDiv.className = 'message other';
                }

                messageDiv.innerHTML = `
                    <span class="username">${data.name}</span>
                    ${data.text}
                `;

                container.appendChild(messageDiv);
                
                // Automatycznie zjeżdża ekranem na sam dół do nowej wiadomości
                container.scrollTop = container.scrollHeight;
            });
        }
    </script>
</body>
</html>
