<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekipa Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- EKRAN LOGOWANIA --- */
        #login-screen {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
        }

        #login-screen h1 { margin-bottom: 20px; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: none;
            border-radius: 10px;
            background: var(--bg-color);
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }

        input:focus { border: 2px solid var(--primary); }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: var(--primary-hover); }

        /* --- EKRAN CZATU --- */
        #chat-screen {
            display: none; /* Ukryty na start */
            flex-direction: column;
            width: 100%;
            max-width: 600px;
            height: 90vh;
            background: var(--panel-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .chat-header {
            background: var(--bg-color);
            padding: 20px;
            text-align: center;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Dymki wiadomości */
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.other {
            background: var(--bg-color);
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        .message.me {
            background: var(--primary);
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .message .username {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            display: block;
        }

        .message.me .username { color: #c7d2fe; }

        .chat-input-area {
            display: flex;
            padding: 20px;
            background: var(--bg-color);
            border-top: 1px solid rgba(255,255,255,0.1);
            gap: 10px;
        }

        .chat-input-area input { margin-bottom: 0; }
        .chat-input-area button { width: auto; padding: 0 25px; }

    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Wbijaj na Czat</h1>
        <input type="text" id="username-input" placeholder="Wpisz swój nick..." autocomplete="off">
        <button onclick="login()">Wejdź</button>
    </div>

    <div id="chat-screen">
        <div class="chat-header" id="chat-title">
            Wspólny Czat
        </div>
        
        <div class="chat-messages" id="messages-container">
            <div class="message other">
                <span class="username">System</span>
                Witaj na czacie! Pamiętaj o kulturze.
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="message-input" placeholder="Napisz wiadomość..." autocomplete="off">
            <button onclick="sendMessage()">Wyślij</button>
        </div>
    </div>

    <script>
        let currentUser = "";

        // Funkcja logowania (przełącza ekrany)
        function login() {
            const usernameInput = document.getElementById('username-input').value.trim();
            if (usernameInput.length < 2) {
                alert("Nick musi mieć minimum 2 znaki!");
                return;
            }
            
            currentUser = usernameInput;
            
            // Ukryj logowanie, pokaż czat
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            // Dodaj nasłuchiwanie na klawisz "Enter" w polu wiadomości
            document.getElementById("message-input").addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    sendMessage();
                }
            });
        }

        // Funkcja wysyłania wiadomości (na razie tylko wizualna)
        function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const messageText = messageInput.value.trim();

            if (messageText === "") return;

            const container = document.getElementById('messages-container');

            // Tworzenie HTML dla nowego dymka z wiadomością
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message me'; // Klasa 'me' stylizuje dymek po prawej stronie
            messageDiv.innerHTML = `
                <span class="username">${currentUser}</span>
                ${messageText}
            `;

            // Dodanie dymka do czatu
            container.appendChild(messageDiv);

            // Wyszczyszczenie pola tekstowego
            messageInput.value = '';

            // Automatyczne przewijanie czatu na sam dół
            container.scrollTop = container.scrollHeight;
        }
    </script>

</body>
</html>
