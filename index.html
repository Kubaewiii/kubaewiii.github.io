<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mordo, Twoje Linki | #ZMIEN-TYTUŁ-STRONY#</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- ZMIENNE (KOLORY) - TU MOŻESZ ZMIENIĆ KLIMAT --- */
        :root {
            --bg-deep: #08080c; /* Bardzo ciemne tło */
            --accent-glow: #a37cff; /* Neonowy fiolet poświaty */
            --accent-hover: #4da1ff; /* Niebieski hover przycisków */
            --glass: rgba(255, 255, 255, 0.05); /* Przezroczyste szkło */
            --text: #f0f0f0; /* Kolor tekstu */
        }

        /* RESET I PODSTAWY */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- TŁO Z ANIMACJĄ DRYGOTU (Gradient Drift) --- */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(163, 124, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(77, 161, 255, 0.1) 0%, transparent 35%),
                var(--bg-deep);
            animation: gradientMove 15s ease infinite alternate;
        }

        @keyframes gradientMove {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* --- GŁÓWNY KONTENER ("KARTA") --- */
        .container {
            width: 90%;
            max-width: 450px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Efekt Glassmorphism */
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            
            /* Animacja wejścia karty */
            opacity: 0;
            transform: translateY(30px);
            animation: cardIn 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            animation-delay: 0.2s;
        }

        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PROFILOWE (AWATAR) Z NEONOWĄ POŚWIATĄ --- */
        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-image: url('https://w7.pngwing.com/pngs/340/946/png-transparent-avatar-user-computer-icons-software-developer-avatar-child-face-heroes-thumbnail.png'); /* #ZMIEN-MNIE# (Wpisz link do swojego awatara) */
            background-size: cover;
            background-position: center;
            border: 3px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
            
            /* Neonowa poświata wokół awatara */
            box-shadow: 0 0 15px rgba(163, 124, 255, 0.6),
                        0 0 30px rgba(163, 124, 255, 0.3);
        }

        /* --- TEKSTY GŁÓWNE --- */
        .name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .bio {
            font-size: 0.95rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* --- KONTENER NA LINKI Z KASKADOWĄ ANIMACJĄ --- */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- PRZYCISKI LINKÓW --- */
        .link-btn {
            width: 100%;
            display: block;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 1rem;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            overflow: hidden;

            /* Animacja kaskadowa wejścia (delay) */
            opacity: 0;
            transform: translateX(-30px);
            animation: linkIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes linkIn {
            to { opacity: 1; transform: translateX(0); }
        }

        /* Opóźnienia dla kolejnych linków (kaskada) */
        .link-btn:nth-child(1) { animation-delay: 0.5s; }
        .link-btn:nth-child(2) { animation-delay: 0.6s; }
        .link-btn:nth-child(3) { animation-delay: 0.7s; }
        .link-btn:nth-child(4) { animation-delay: 0.8s; }
        .link-btn:nth-child(5) { animation-delay: 0.9s; }

        /* --- EFEKT HOVER NA LINKACH (WYPASY!) --- */
        .link-btn:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-hover);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2),
                        0 0 15px rgba(77, 161, 255, 0.4);
        }

        /* Poświata od spodu przycisku (gradient) */
        .link-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-hover), transparent);
            transform: translateX(-50%);
            transition: width 0.4s ease;
        }

        .link-btn:hover::after {
            width: 80%;
        }

        /* --- SPECJALNY PRZYCISK (Niski, wyróżniony) --- */
        .special-btn {
            background: rgba(163, 124, 255, 0.15);
            border-color: rgba(163, 124, 255, 0.3);
            color: var(--accent-glow);
        }

        .special-btn:hover {
            background: rgba(163, 124, 255, 0.25);
            border-color: var(--accent-glow);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2),
                        0 0 15px rgba(163, 124, 255, 0.4);
        }

        /* --- STOPKA (Prawa autorskie) --- */
        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

    </style>
</head>
<body>

    <div class="animated-bg"></div>

    <div class="container">
        
        <div class="profile-pic"></div>

        <h1 class="name">mordo_pro</h1> <p class="bio">Programowanie, fazy, i maseczka na twarz. 🕶️ #WbijajDoEkipy </p> <div class="links">
            
            <a href="https://youtube.com/@mordo" target="_blank" class="link-btn">
                Zasubskrybuj mnie na YT 🚀
            </a> <a href="https://instagram.com/mordo" target="_blank" class="link-btn">
                Wpadnij na Instagrama 📸
            </a> <a href="https://tiktok.com/@mordo" target="_blank" class="link-btn">
                Mega TikToki (nie pożałujesz) 🤪
            </a> <a href="https://allegro.pl/user/mordo" target="_blank" class="link-btn special-btn">
                Wspieraj moją twórczość ☕
            </a> <footer>© 2026 Mordo Solutions™ | Wszystko za darmo dla wszystkich</footer>

    </div>

</body>
</html>
